<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Data Information & Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container-fluid login-container">
        <div class="row vh-100">
            <div class="col-md-6 login-image-container d-none d-md-flex">
                <div class="login-overlay">
                    <h1 class="display-4 text-white mb-4">Health Data Information & Management System</h1>
                    <p class="lead text-white">Streamlining healthcare data for better patient outcomes</p>
                </div>
            </div>
            <div class="col-md-6 d-flex align-items-center">
                <div class="login-form-container">
                    <div class="text-center mb-5">
                        <i class="bi bi-plus-circle-fill text-primary" style="font-size: 4rem;"></i>
                        <h2 class="mt-3">HDIMS Login</h2>
                        <p class="text-muted">Enter your credentials to access the system</p>
                    </div>

                    <div class="alert alert-danger d-none" id="error-message" role="alert"></div>
                    
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p>Don't have an account? <a href="#" id="signup-link" class="text-decoration-none">Sign up</a></p>
                    </div>

                    <div class="register-form d-none" id="register-form-container">
                        <h3 class="mb-3">Create Account</h3>
                        <form id="register-form">
                            <div class="mb-3">
                                <label for="reg-email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="reg-email" required>
                            </div>
                            <div class="mb-3">
                                <label for="reg-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="reg-password" required>
                            </div>
                            <div class="mb-3">
                                <label for="role" class="form-label">Role</label>
                                <select class="form-select" id="role" required>
                                    <option value="" selected disabled>Select a role</option>
                                    <option value="patient">Patient</option>
                                    <option value="doctor">Doctor</option>
                                    <option value="admin">Administrator</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Register</button>
                            <button type="button" id="back-to-login" class="btn btn-link w-100">Back to Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- HDIMS DSA Implementations -->
    <script src="js/dsa-implementations.js"></script>

    <script src="js/main.js"></script>
</body>
